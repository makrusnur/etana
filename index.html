<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ETANA - Sistem Informasi Lahan Desa</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      :root { 
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --primary: 221.2 83.2% 53.3%;
        --radius: 0.5rem;
      }

      body, html, #root { 
        height: 100%; 
        margin: 0; 
        padding: 0;
        font-family: 'Inter', sans-serif; 
        background-color: #ffffff;
        overflow: hidden; /* Mencegah scroll double pada aplikasi peta */
      }

      /* Fix: Kursor Crosshair saat mode gambar aktif */
      .leaflet-container.leaflet-draw-selectable {
        cursor: crosshair !important;
      }

      /* Custom Scrollbar untuk Sidebar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Memastikan kontrol draw muncul dengan benar di atas peta */
      .leaflet-draw-toolbar a {
        background-color: white !important;
        border-bottom: 1px solid #ccc !important;
      }
    </style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <script>
      // Mock process env untuk browser
      window.process = { 
        env: { 
          API_KEY: "", 
          SUPABASE_URL: "", 
          SUPABASE_ANON_KEY: "" 
        } 
      };
    </script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4",
          "@turf/turf": "https://esm.sh/@turf/turf@7.1.0",
          "react-router-dom": "https://esm.sh/react-router-dom@7.1.0",
          "lucide-react": "https://esm.sh/lucide-react@0.453.0",
          "react-leaflet": "https://esm.sh/react-leaflet@4.2.1",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "jspdf": "https://esm.sh/jspdf@2.5.1",
          "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2"
        }
      }
    </script>
  </head>

  <body class="antialiased">
    <div id="root"></div>
    
    <script type="module" src="/index.tsx"></script>

    <script>
      // Menangani error jika script eksternal gagal dimuat
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT') {
          console.warn('Gagal memuat script:', e.target.src);
        }
      }, true);
    </script>
  </body>
</html>
